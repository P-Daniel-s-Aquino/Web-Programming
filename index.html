<!-- La declaración <!DOCTYPE html> define que este documento es un documento HTML5. Es una declaración obligatoria. -->
<!DOCTYPE html>
<!-- El elemento <html> es el elemento raíz de una página HTML. El atributo 'lang' especifica el idioma del contenido, en este caso, "en" por inglés. -->
<html lang="en">
<head>
    <!-- La etiqueta <head> contiene metadatos (datos sobre el documento HTML), como el título, enlaces a scripts y hojas de estilo. -->
    <title>PaginaWebI</title> <!-- La etiqueta <title> establece el título de la página que se muestra en la pestaña del navegador. -->
</head>
<body>
    <!-- La etiqueta <body> contiene todo el contenido visible de una página web. -->

    <!-- Las etiquetas <h1> a <h6> se usan para definir encabezados o títulos, donde <h1> es el más importante y <h6> el menos importante. -->
    <h1>Primer Header</h1>
    <h2>Segundo Header</h2>
    <h3>Tercer Header</h3>
    <h4>Cuarto Header</h4>
    <h5>Quinto Header</h5>
    <h6>Sexto Header</h6>
    <!-- La etiqueta <h7> no existe en HTML. Los niveles de encabezado solo van de <h1> a <h6>. Los navegadores la tratarán como texto normal. -->
    <p>Header no válido (era h7)</p>

    <hr> <!-- La etiqueta <hr> crea una ruptura temática, que visualmente se representa como una línea horizontal. -->

    <p>Párrafo a mostrar</p> <!-- La etiqueta <p> se usa para definir un párrafo de texto. -->

    <!-- La etiqueta <a> define un hipervínculo. El atributo 'href' especifica la URL a la que apunta el enlace. -->
    <a href="https://www.google.com">Google en la misma ventana</a>

    <p></p> <!-- Un párrafo vacío, que generalmente agrega un espacio vertical. -->

    <!-- El atributo 'target="_blank"' hace que el enlace se abra en una nueva pestaña o ventana del navegador. -->
    <a target="_blank" href="https://www.google.com">Google en otra ventana</a>

    <p></p>

    <!-- La etiqueta <img> se usa para incrustar una imagen. El atributo 'src' especifica la ruta (URL o local) de la imagen a mostrar. -->
    <img src="https://w.wallhaven.cc/full/nk/wallhaven-nkj5q4.jpg" width="1920"/> <!-- Añadí un 'width' para que no sea tan grande -->

    <hr>

    <p></p>
    Aca va el codigo.

    <!-- La etiqueta <form> se usa para crear un formulario HTML para la entrada de datos del usuario. -->
    <!-- 'action' es la URL a donde se envían los datos. 'method' es el método HTTP (post o get). -->
    <form action="/formulario" method="post">
        <!-- La etiqueta <label> define una etiqueta para un elemento <input>. El atributo 'for' lo vincula con el 'id' del input. -->
        <label for="nombre"> Nombre </label>
        <!-- La etiqueta <input> es un campo de entrada. 'type' define el tipo de entrada. -->
        <input type="text" id="nombre" placeholder="Nombre">

        <label for="dni"> DNI </label>
        <!-- type="password" hace que el texto introducido se oculte. 'name' es el nombre del campo que se envía al servidor. -->
        <input type="password" id="dni" name="dni" placeholder="XX.XXX.XXX">
        
        <br> <!-- La etiqueta <br> inserta un salto de línea simple. -->
        <br>

        <!-- <textarea> es un campo de entrada de texto de múltiples líneas. -->
        <textarea name="comentario" id="comentario" placeholder="Ingrese comentario" rows="3"></textarea>
        <br>
        <!-- type="submit" crea un botón que envía el formulario. 'value' es el texto que muestra el botón. -->
        <input type="submit" value="Enviar">
    </form>

    <br>

    <footer>
        <!-- La etiqueta <footer> define el pie de página de un documento o sección. -->
        Este es el pie de pagina.
    </footer>

</body>
</html>
